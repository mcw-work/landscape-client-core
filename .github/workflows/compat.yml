name: Bpickle Wire Compatibility

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - 'internal/bpickle/**'

jobs:
  compat:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout landscape-client-core
        uses: actions/checkout@v4

      - name: Checkout landscape-client (Python reference)
        uses: actions/checkout@v4
        with:
          repository: canonical/landscape-client
          path: landscape-client

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Run bpickle compat tests
        env:
          LANDSCAPE_CLIENT_PATH: ${{ github.workspace }}/landscape-client
        run: go test -tags compat -v ./internal/bpickle/...
